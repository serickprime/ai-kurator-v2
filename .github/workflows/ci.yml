name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python
        run: python -m compileall app scripts tests

      - name: Run pytest
        run: python -m pytest -q

      - name: Validate JSON files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          failed = False
          for path in sorted(Path(".").rglob("*.json")):
              if any(part in {".git", ".venv", "venv", "eval_runs"} for part in path.parts):
                  continue
              try:
                  json.loads(path.read_text(encoding="utf-8"))
              except Exception as exc:
                  print(f"{path}: {exc}")
                  failed = True
          raise SystemExit(1 if failed else 0)
          PY

      - name: Secret grep
        run: python scripts/check_tracked_secrets.py
