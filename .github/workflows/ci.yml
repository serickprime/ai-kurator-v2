name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python
        run: python -m compileall app scripts tests

      - name: Run pytest
        run: python -m pytest -q

      - name: Validate JSON files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          failed = False
          for path in sorted(Path(".").rglob("*.json")):
              if any(part in {".git", ".venv", "venv", "eval_runs"} for part in path.parts):
                  continue
              try:
                  json.loads(path.read_text(encoding="utf-8"))
              except Exception as exc:
                  print(f"{path}: {exc}")
                  failed = True
          raise SystemExit(1 if failed else 0)
          PY

      - name: Secret grep
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          pattern = re.compile(
              "|".join(
                  [
                      "sb_" + "secret_",
                      "gh" + "p_",
                      "github_" + "pat_",
                      r"[0-9]{8,}:[A-Za-z0-9_-]{20,}",
                  ]
              )
          )
          ignored_dirs = {".git", ".venv", "venv", "__pycache__", "eval_runs", "logs"}
          ignored_files = {"AGENTS.md"}
          hits = []
          for path in Path(".").rglob("*"):
              if not path.is_file() or path.name in ignored_files:
                  continue
              if any(part in ignored_dirs for part in path.parts):
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              for index, line in enumerate(text.splitlines(), start=1):
                  if pattern.search(line):
                      hits.append(f"{path}:{index}")
          if hits:
              print("Potential secrets found:")
              print("\n".join(hits))
              raise SystemExit(1)
          PY
